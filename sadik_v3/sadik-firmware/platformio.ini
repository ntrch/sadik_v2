[platformio]
; Unicode path (OneDrive/Masaüstü) breaks mingw ld map writer — redirect build dir to ASCII path.
build_dir = ${sysenv.USERPROFILE}/pio_build/sadik_v3

[env:t-display-s3]
platform = espressif32
; No official lilygo-t-display-s3 board def in upstream PIO registry yet — use
; esp32-s3-devkitc-1 and override all board settings via build_flags/board_build.
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 921600
upload_port = COM8
monitor_port = COM8
upload_speed = 921600
build_src_filter = -<*> +<main.cpp> +<rtos_tasks.cpp>
lib_deps =
    bitbank2/JPEGDEC@^1.2.0
    lovyan03/LovyanGFX@^1.1.16
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -Os
    -DSADIK_COLOR=1
    -DSADIK_COLOR_S3=1
    -DSADIK_VARIANT_COLOR_V2=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    ; Sub-1.2: display_manager.h will add -DLGFX_USE_CONFIG_FILE or equivalent
board_build.partitions = partitions_s3_n16r8.csv
board_build.filesystem = littlefs
board_build.flash_mode = qio
board_build.flash_size = 16MB
; N16R8 confirmed combo: flash=QIO, PSRAM=OPI → qio_opi (opi_opi causes boot loop)
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
; app0 partition is 0x600000 (6MB) — match exactly so PIO doesn't reject
board_upload.maximum_size = 6291456
