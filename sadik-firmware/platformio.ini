[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_port = COM6
monitor_port = COM6
lib_deps =
    olikraus/U8g2@^2.35.0
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -Os
board_build.partitions = huge_app.csv
src_filter = -<*> +<main.cpp>

; ── INMP441 microphone proof-of-concept (Phase 3.5A discovery) ────────────────
; Builds ONLY mic_poc.cpp — main.cpp and all production sources are excluded.
; Upload: pio run -e mic_poc -t upload
; Monitor: pio device monitor -e mic_poc
[env:mic_poc]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_port = COM6
monitor_port = COM6
lib_deps =
    olikraus/U8g2@^2.35.0
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -Os
board_build.partitions = huge_app.csv
src_filter = -<*> +<mic_poc.cpp>
