[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 460800
upload_port = COM6
monitor_port = COM6
upload_speed = 460800
lib_deps =
    adafruit/Adafruit ST7735 and ST7789 Library@^1.10.4
    adafruit/Adafruit GFX Library@^1.11.9
    bodmer/TJpg_Decoder@^1.1.0
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -Os
    -DTFT_SPI_HZ=40000000
    -DSADIK_COLOR=1
board_build.partitions = huge_app.csv
build_src_filter = -<*> +<main.cpp> +<rtos_tasks.cpp>

[env:esp32-s3-n16r8]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 921600
upload_port = COM8
monitor_port = COM8
upload_speed = 921600
build_src_filter = -<*> +<main.cpp> +<rtos_tasks.cpp>
lib_deps =
    adafruit/Adafruit ST7735 and ST7789 Library@^1.10.4
    adafruit/Adafruit GFX Library@^1.11.9
    bodmer/TJpg_Decoder@^1.1.0
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -Os
    -DTFT_SPI_HZ=40000000
    -DSADIK_COLOR=1
    -DSADIK_COLOR_S3=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
board_build.partitions = partitions_s3_n16r8.csv
board_build.filesystem = littlefs
board_build.flash_mode = qio
board_build.flash_size = 16MB
; N16R8: flash = QIO (confirmed via "Octal Flash EFUSE not configured" abort when
; opi_opi was tried), PSRAM = OPI (esptool reports "Embedded PSRAM 8MB"). Correct
; combo = qio_opi. If ESP.getPsramSize() still returns 0 at runtime despite this,
; the issue is Arduino SDK PSRAM init, not flash/PSRAM hardware mode — debug there.
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
; app0 partition is 0x600000 (6MB) — match exactly so PIO doesn't reject
board_upload.maximum_size = 6291456

; ── INMP441 microphone proof-of-concept (Phase 3.5A discovery) ────────────────
; Builds ONLY mic_poc.cpp — main.cpp and all production sources are excluded.
; Upload: pio run -e mic_poc -t upload
; Monitor: pio device monitor -e mic_poc
[env:mic_poc]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_port = COM6
monitor_port = COM6
lib_deps =
    olikraus/U8g2@^2.35.0
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -Os
board_build.partitions = huge_app.csv
build_src_filter = -<*> +<mic_poc.cpp>
